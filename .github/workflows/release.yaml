name: Release to prod

run-name: Deploy to 'prod'

on:
  workflow_dispatch:

env:
  REGISTRY: europe-west1-docker.pkg.dev
  REPOSITORY: stape-production/stape
  IMAGE: mcp-gads

jobs:
  generate-image-tag:
    name: Generate Docker Image Tag
    uses: ./.github/workflows/generate-tag.yaml

  build-and-push-image:
    name: Build Docker Image and Push to GAR
    needs: generate-image-tag
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/207001532273/locations/global/workloadIdentityPools/github/providers/stape-io
          service_account: github-actions@stape-production.iam.gserviceaccount.com
          token_format: access_token

      - name: Login to GAR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ needs.generate-image-tag.outputs.image_tag }}

  sync-prod-secret:
    name: Sync prod secret
    needs:
      - generate-image-tag
      - build-and-push-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud for thor
        id: auth-thor
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/207001532273/locations/global/workloadIdentityPools/github/providers/stape-io
          service_account: github-actions@stape-production.iam.gserviceaccount.com

      - name: Get GKE credentials for thor
        uses: google-github-actions/get-gke-credentials@v2
        with:
          project_id: stape-production
          cluster_name: ${{ secrets.GKE_CLUSTER_PROD }}
          location: ${{ secrets.GKE_LOCATION_PROD }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v1

      - name: Sync prod secret to thor
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          item_json=$(op item get env.prod --vault google-ads-mcp --format json)

          printf '%s' "$item_json" | jq -r '
            [ .fields[]? | select(.label != "notesPlain" and .value != null and .value != "") | "\(.label)=\(.value)" ] as $pairs
            | if ($pairs | length) > 0 then
                $pairs[]
              else
                (.fields[]? | select(.label == "notesPlain") | .value // empty)
              end
          ' > .env.local

          test -s .env.local

          kubectl create namespace mcp-gads --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic mcp-gads \
            --namespace mcp-gads \
            --dry-run=client \
            --from-env-file=.env.local \
            -o yaml | kubectl apply -f -

  update-argocd:
    name: Update ArgoCD config
    needs:
      - generate-image-tag
      - build-and-push-image
      - sync-prod-secret
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Image Tag in values-prod.yaml
        uses: fjogeleit/yaml-update-action@main
        with:
          branch: main
          changes: |
            {
              "chart/values-prod.yaml": {
                "image.tag": "${{ needs.generate-image-tag.outputs.image_tag }}"
              }
            }
          message: Updated image.tag in values-prod.yaml
          quotingType: '"'
          token: ${{ github.token }}
