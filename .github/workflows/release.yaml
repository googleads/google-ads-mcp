name: Release to prod

run-name: Deploy to 'prod'

on:
  workflow_dispatch:

env:
  REGISTRY: europe-west1-docker.pkg.dev
  REPOSITORY: stape-production/stape
  IMAGE: mcp-gads

jobs:
  generate-image-tag:
    name: Generate Docker Image Tag
    uses: ./.github/workflows/generate-tag.yaml

  build-and-push-image:
    name: Build Docker Image and Push to GAR
    needs: generate-image-tag
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/207001532273/locations/global/workloadIdentityPools/github/providers/stape-io
          service_account: github-actions@stape-production.iam.gserviceaccount.com
          token_format: access_token

      - name: Login to GAR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ needs.generate-image-tag.outputs.image_tag }}

  update-argocd:
    name: Update ArgoCD config
    needs:
      - generate-image-tag
      - build-and-push-image
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Create Releaser GitHub App Token
        uses: actions/create-github-app-token@v1
        id: create-releaser-github-app-token
        with:
          app-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_KEY }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Image Tag in values-prod.yaml
        uses: fjogeleit/yaml-update-action@main
        with:
          branch: main
          changes: |
            {
              "chart/values-prod.yaml": {
                "image.tag": "${{ needs.generate-image-tag.outputs.image_tag }}"
              }
            }
          message: Updated image.tag in values-prod.yaml
          quotingType: '"'
          token: ${{ steps.create-releaser-github-app-token.outputs.token }}
